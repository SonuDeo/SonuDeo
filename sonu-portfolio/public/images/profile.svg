<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" width="480" height="600" role="img" aria-label="Profile portrait placeholder for Sonu Kumar">
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10141f"/>
      <stop offset="55%" stop-color="#0a0d16"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="34%" r="55%">
      <stop offset="0%" stop-color="#1c2433" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blurMore"><feGaussianBlur stdDeviation="11"/></filter>
  </defs>

  <rect width="480" height="600" fill="url(#scene)"/>
  <rect width="480" height="600" fill="url(#spot)"/>

  <!-- motion-blurred crowd suggestion -->
  <g filter="url(#blurMore)" opacity="0.5">
    <ellipse cx="70" cy="300" rx="46" ry="120" fill="#2a3346"/>
    <ellipse cx="420" cy="300" rx="50" ry="130" fill="#283142"/>
    <ellipse cx="150" cy="320" rx="34" ry="110" fill="#1e2636"/>
    <ellipse cx="350" cy="320" rx="36" ry="115" fill="#1e2636"/>
  </g>

  <!-- ceiling light streaks -->
  <g opacity="0.25" filter="url(#blur)">
    <rect x="120" y="40" width="240" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="170" y="70" width="140" height="4" rx="2" fill="#94a3b8"/>
  </g>

  <!-- central figure -->
  <g filter="url(#blur)">
    <!-- shoulders / coat -->
    <path d="M120 600c0-120 50-186 120-186s120 66 120 186z" fill="#161b27"/>
    <path d="M210 470 h60 l-6 130 h-48 z" fill="#10141d"/>
    <!-- neck -->
    <rect x="222" y="372" width="36" height="60" rx="14" fill="#3a3026"/>
    <!-- head -->
    <ellipse cx="240" cy="320" rx="62" ry="74" fill="#43382b"/>
    <!-- hair (curly) -->
    <path d="M178 300c-6-58 38-96 62-96s70 34 62 96c-8-30-30-46-62-46s-54 16-62 46z" fill="#0e0c0a"/>
    <circle cx="196" cy="288" r="16" fill="#0e0c0a"/>
    <circle cx="284" cy="288" r="16" fill="#0e0c0a"/>
    <circle cx="240" cy="262" r="18" fill="#0e0c0a"/>
  </g>

  <!-- glasses -->
  <g stroke="#1b2230" stroke-width="4" fill="none" opacity="0.9">
    <circle cx="218" cy="328" r="20"/>
    <circle cx="262" cy="328" r="20"/>
    <line x1="238" y1="328" x2="242" y2="328"/>
  </g>

  <!-- accent ring -->
  <circle cx="240" cy="320" r="150" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>

  <text x="240" y="566" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#64748b" font-weight="600">Sonu Kumar</text>
  <text x="240" y="586" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" font-weight="500">Add photo → public/images/profile.jpg</text>
</svg>
